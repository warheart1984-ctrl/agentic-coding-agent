version: "3.9"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "8080"
      HOST: "0.0.0.0"
      DATABASE_PATH: /data/sovereign.db
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      DEFAULT_PROVIDER: local
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOCAL_MODEL_BASE_URL: ${LOCAL_MODEL_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-codellama}
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data: