node:
  id: local-node-01
  version: 1.0.0
  description: Sovereign Node feature manifest for Nova Desktop
  startup:
    auto_load: true
    health_check: true
    governance_mode: strict
modules:
  core:
    - file_search
    - symbol_search
    - patch_manager
    - terminal
    - test_runner
    - git_panel
  nova_specific:
    - governance_receipt_inspector
    - replay_timeline
    - tool_registry
    - node_health_strip
    - local_model_selector
  power_user:
    - command_palette
    - context_builder
    - explain_mode
    - project_templates
    - safety_rails
ui_panels:
  - name: DiffViewer
    component: diff_panel
    features: [apply_patch, reject_hunk, rollback_patch]
  - name: Terminal
    component: terminal_panel
    features: [run_tests, run_app, run_lint, link_output]
  - name: TestRunner
    component: test_panel
    features: [run_file_tests, run_failed_tests, fix_failure]
  - name: GitPanel
    component: git_panel
    features: [changed_files, staged_diff, commit_generator, pr_summary]
  - name: GovernanceInspector
    component: governance_panel
    features: [policy_version, trace_id, input_output_hashes]
  - name: ReplayTimeline
    component: replay_panel
    features: [deterministic_replay, drift_warning, rollback]
  - name: NodeHealth
    component: health_strip
    metrics: [model, online_status, receipts_count, latency, governance_state]
  - name: ModelSelector
    component: model_dropdown
    models: [qwen2.5-coder:3b, qwen2.5-coder:7b]
governance:
  receipts:
    verify_function: verify_receipt
    ledger_path: ./ledger/receipts.db
    replay_path: ./ledger/replay.db
  policies:
    enforcement: strict
    versioning: semantic
    audit_log: true
templates:
  - python_fastapi
  - node_express
  - rust_actix
  - governed_nova_tool
  - local_ai_app
safety:
  auto_write: false
  warn_large_patches: true
  warn_secrets: true
  confirm_dependency_changes: true
runtime:
  hooks:
    on_patch_applied:
      emit: governance.patch_applied
      record_receipt: true
      replayable: true
    on_patch_rejected:
      emit: governance.patch_rejected
      record_receipt: true
    on_hunk_applied:
      emit: governance.hunk_applied
      record_receipt: true
    on_hunk_rejected:
      emit: governance.hunk_rejected
      record_receipt: true
    on_patch_rollback:
      emit: governance.patch_rollback
      record_receipt: true
      replayable: true
    on_test_run_started:
      emit: test.run_started
      attach_context: true
    on_test_run_completed:
      emit: test.run_completed
      record_receipt: true
      attach_output: true
    on_test_failure_detected:
      emit: test.failure
      record_receipt: true
      auto_context: failing_test_output
    on_commit_created:
      emit: git.commit
      record_receipt: true
    on_branch_changed:
      emit: git.branch_changed
    on_tool_invoked:
      emit: tool.invoked
      record_receipt: true
      include: [tool_name, args_hash, governed_state]
    on_tool_completed:
      emit: tool.completed
      record_receipt: true
      include: [output_hash, duration_ms]
    on_receipt_verified:
      emit: governance.receipt_verified
      update_health: true
    on_receipt_blocked:
      emit: governance.receipt_blocked
      update_health: true
      attach_policy: true
    on_replay_started:
      emit: replay.started
      attach_trace: true
    on_replay_completed:
      emit: replay.completed
      record_receipt: true
    on_replay_drift:
      emit: replay.drift_detected
      severity: high
      auto_flag: true
      suggest_rollback: true
    on_node_online:
      emit: node.online
      update_health: true
    on_node_offline:
      emit: node.offline
      update_health: true
    on_latency_spike:
      emit: node.latency_spike
      severity: medium
event_bus:
  channels:
    - governance.*
    - test.*
    - git.*
    - tool.*
    - replay.*
    - node.*
  transport: internal
  persistence: true
  max_events: 5000
